services:
  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      MONGODB_URI: mongodb://mongo:27017/pokemon-stadium
      POKEMON_API_BASE_URL: https://pokemon-api-92034153384.us-central1.run.app
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
