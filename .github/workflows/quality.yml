name: Quality

on:
  workflow_call:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Start MongoDB replica set
        run: |
          docker compose -f docker-compose.e2e.yml up -d --wait
          sleep 5
          docker exec $(docker compose -f docker-compose.e2e.yml ps -q mongo-test) mongosh --eval "rs.status().ok" --quiet || true

      - name: Run E2E tests
        env:
          MONGODB_URI: mongodb://localhost:27017/pokemon-stadium-e2e?replicaSet=rs0
          POKEMON_API_BASE_URL: https://pokemon-api-92034153384.us-central1.run.app
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          NODE_ENV: test
          PORT: 0
        run: pnpm vitest run --config vitest.e2e.config.ts

      - name: Stop MongoDB
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
