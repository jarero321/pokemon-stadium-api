services:
  mongo-test:
    image: mongo:7
    command: ["--replSet", "rs0"]
    ports:
      - "27018:27017"
    tmpfs:
      - /data/db
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0,host:'localhost:27017'}]}).ok }
        " --quiet
      interval: 2s
      timeout: 5s
      retries: 10
